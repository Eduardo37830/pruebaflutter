<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Escritor - Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#c3a881",
                        "outline": "#75777d",
                        "on-secondary-container": "#54647a",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#dbdad5",
                        "surface-container-high": "#eae8e3",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#3a485c",
                        "surface-bright": "#fbf9f4",
                        "background": "#fbf9f4",
                        "inverse-surface": "#30312e",
                        "tertiary": "#38270a",
                        "on-primary-container": "#9eadc5",
                        "inverse-primary": "#b9c7e0",
                        "surface-container-low": "#f5f3ee",
                        "on-surface-variant": "#44474c",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-background": "#1b1c19",
                        "on-primary-fixed": "#0d1c2f",
                        "surface-tint": "#515f74",
                        "secondary-fixed": "#d3e4fe",
                        "on-tertiary-fixed-variant": "#574424",
                        "on-tertiary-fixed": "#281901",
                        "tertiary-container": "#503d1e",
                        "on-primary": "#ffffff",
                        "surface": "#fbf9f4",
                        "tertiary-fixed": "#fcdeb3",
                        "outline-variant": "#c5c6cd",
                        "on-error": "#ffffff",
                        "on-surface": "#1b1c19",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e2dd",
                        "surface-variant": "#e4e2dd",
                        "inverse-on-surface": "#f2f1ec",
                        "primary-fixed-dim": "#b9c7e0",
                        "primary": "#1d2b3e",
                        "surface-container": "#f0eee9",
                        "primary-fixed": "#d5e3fd",
                        "secondary": "#505f76",
                        "tertiary-fixed-dim": "#dfc299",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#38485d",
                        "secondary-container": "#d0e1fb",
                        "primary-container": "#334155",
                        "on-secondary-fixed": "#0b1c30"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Newsreader", "serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom cursor for inputs to mimic ink pen */
        input {
            caret-color: #1d2b3e;
            caret-shape: bar;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gradient-to-br from-surface to-surface-container-low min-h-screen flex items-center justify-center p-6 antialiased selection:bg-secondary-container selection:text-on-surface">
<!-- Ambient background texture element (Ink wash simulation) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-primary via-surface to-surface-container-low mix-blend-multiply"></div>
<main class="w-full max-w-md relative z-10">
<!-- The Canvas Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 sm:p-12 shadow-[0_8px_24px_rgba(27,28,25,0.06)] flex flex-col">
<!-- Header Anchor -->
<div class="text-center mb-12">
<h1 class="font-headline text-4xl italic text-on-surface tracking-tight mb-2">Escritor</h1>
<p class="font-label text-sm text-secondary tracking-widest uppercase">The Zen Atelier</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Email Input Zone -->
<div class="flex flex-col gap-2">
<label class="font-label text-sm text-secondary pl-4" for="email">Email</label>
<!-- Input Container using Tonal Layering (No-Line Rule) -->
<div class="bg-surface rounded-full px-6 py-4 flex items-center transition-colors focus-within:bg-surface-container focus-within:shadow-[0_2px_8px_rgba(27,28,25,0.04)]">
<span class="material-symbols-outlined text-outline mr-3 text-[20px]">mail</span>
<input class="w-full bg-transparent border-none outline-none font-label text-on-surface placeholder:text-outline-variant focus:ring-0 text-base p-0" id="email" name="email" placeholder="author@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Zone -->
<div class="flex flex-col gap-2 mt-2">
<label class="font-label text-sm text-secondary pl-4" for="password">Password</label>
<div class="bg-surface rounded-full px-6 py-4 flex items-center transition-colors focus-within:bg-surface-container focus-within:shadow-[0_2px_8px_rgba(27,28,25,0.04)]">
<span class="material-symbols-outlined text-outline mr-3 text-[20px]">lock</span>
<input class="w-full bg-transparent border-none outline-none font-label text-on-surface placeholder:text-outline-variant focus:ring-0 text-base p-0" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Assistance Row -->
<div class="flex justify-end mt-1 mb-6 pr-2">
<a class="font-label text-sm text-secondary hover:text-primary transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary rounded" href="#">
                        Forgot password?
                    </a>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-label text-base font-medium py-4 rounded-full shadow-[0_4px_14px_rgba(29,43,62,0.25)] hover:shadow-[0_6px_20px_rgba(29,43,62,0.3)] hover:opacity-95 transition-all active:scale-[0.98] flex justify-center items-center gap-2 group" type="submit">
                    Continue
                    <span class="material-symbols-outlined text-[18px] opacity-80 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-10 text-center">
<span class="font-label text-sm text-secondary">New to Escritor?</span>
<a class="font-label text-sm text-primary font-semibold ml-1 hover:text-on-surface transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary rounded px-1" href="#">
                    Create account
                </a>
</div>
</div>
<!-- Decorative elements outside the card to break the grid -->
<div class="absolute -right-4 -bottom-6 w-32 h-32 bg-tertiary/5 rounded-full blur-2xl pointer-events-none"></div>
<div class="absolute -left-8 top-12 w-40 h-40 bg-surface-container-highest/20 rounded-full blur-3xl pointer-events-none"></div>
</main>
</body></html>
