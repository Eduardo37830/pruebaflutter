<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Escritor Dashboard</title>
<!-- Google Fonts: Newsreader & Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config from Design System -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#c3a881",
                    "outline": "#75777d",
                    "on-secondary-container": "#54647a",
                    "surface-container-lowest": "#ffffff",
                    "surface-dim": "#dbdad5",
                    "surface-container-high": "#eae8e3",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#3a485c",
                    "surface-bright": "#fbf9f4",
                    "background": "#fbf9f4",
                    "inverse-surface": "#30312e",
                    "tertiary": "#38270a",
                    "on-primary-container": "#9eadc5",
                    "inverse-primary": "#b9c7e0",
                    "surface-container-low": "#f5f3ee",
                    "on-surface-variant": "#44474c",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-background": "#1b1c19",
                    "on-primary-fixed": "#0d1c2f",
                    "surface-tint": "#515f74",
                    "secondary-fixed": "#d3e4fe",
                    "on-tertiary-fixed-variant": "#574424",
                    "on-tertiary-fixed": "#281901",
                    "tertiary-container": "#503d1e",
                    "on-primary": "#ffffff",
                    "surface": "#fbf9f4",
                    "tertiary-fixed": "#fcdeb3",
                    "outline-variant": "#c5c6cd",
                    "on-error": "#ffffff",
                    "on-surface": "#1b1c19",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e4e2dd",
                    "surface-variant": "#e4e2dd",
                    "inverse-on-surface": "#f2f1ec",
                    "primary-fixed-dim": "#b9c7e0",
                    "primary": "#1d2b3e",
                    "surface-container": "#f0eee9",
                    "primary-fixed": "#d5e3fd",
                    "secondary": "#505f76",
                    "tertiary-fixed-dim": "#dfc299",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed-variant": "#38485d",
                    "secondary-container": "#d0e1fb",
                    "primary-container": "#334155",
                    "on-secondary-fixed": "#0b1c30"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Newsreader"
                    ],
                    "body": [
                            "Newsreader"
                    ],
                    "label": [
                            "Manrope"
                    ]
            }
    },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#fbf9f4] dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-serif font-medium tracking-tight w-full top-0 sticky scale-95 duration-150 flex justify-between items-center px-6 py-4 w-full z-40">
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-2xl font-serif italic text-slate-900 dark:text-slate-50">Escritor</h1>
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors rounded-full overflow-hidden w-10 h-10 flex items-center justify-center">
<img alt="Author Profile" class="w-full h-full object-cover" data-alt="close up portrait of a young woman with natural makeup in soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-T2mjbMAOsCS_6FXwOuCEMDR1qNloZQqRxWKnrx8Pevsb9M8f-w1YlWZfoJAK_QiRlOsFmW3Zx37puHgegG4zRwfNzXAqiINNoGe9dTQE3PXRHi_qbz0v03x5xAaHzxlpg2sOTsYLeIxtinWPNZ0ommom5hQVRNQITXpWKb9yTTSJk2IEoZzleAxowwyyHg03SnNyLrdMlGCS1TzkTXg7OB5DYten0x_vm8RMNpLFMzcZEhSHC2retIROkD3IR3Cg0SLBVEyCkuA"/>
</button>
</header>
<!-- Main Content Canvas -->
<main class="max-w-4xl mx-auto px-6 pt-8 pb-24">
<!-- Welcome Header -->
<div class="mb-10 pr-12">
<h2 class="font-headline text-4xl md:text-5xl font-normal text-on-surface tracking-tight leading-tight mb-2">Good morning,<br/><span class="italic text-primary">Writer.</span></h2>
<p class="font-label text-secondary text-sm md:text-base mt-4">You have 3 drafts awaiting your attention.</p>
</div>
<!-- Search Bar (Custom Component) -->
<div class="mb-12 relative w-full max-w-lg">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
</div>
<input class="w-full bg-surface-container-lowest text-on-surface font-label text-sm rounded-full py-4 pl-12 pr-6 border-none shadow-[0_8px_24px_rgba(27,28,25,0.06)] focus:ring-0 focus:outline-none placeholder:text-outline transition-shadow duration-300" placeholder="Search manuscripts, notes, tags..." type="text"/>
</div>
<!-- Projects Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Card 1 (New Draft - Accentuated) -->
<article class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_8px_24px_rgba(27,28,25,0.06)] hover:-translate-y-1 transition-transform duration-300 cursor-pointer relative overflow-hidden group flex flex-col h-full min-h-[220px]">
<div class="flex justify-between items-start mb-6">
<span class="font-label text-[10px] uppercase tracking-widest text-primary-container bg-surface-container px-3 py-1 rounded-full">Manuscript</span>
<button class="text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<div class="mt-auto">
<h3 class="font-headline text-2xl text-on-surface font-medium leading-snug mb-3 group-hover:text-primary transition-colors">The Obsidian Mirror</h3>
<div class="flex items-center gap-2 font-label text-xs text-secondary">
<span class="material-symbols-outlined text-[14px]" data-icon="edit_note">edit_note</span>
<span>Edited 2 hours ago</span>
</div>
</div>
</article>
<!-- Card 2 -->
<article class="bg-surface-container-low rounded-xl p-8 hover:-translate-y-1 transition-transform duration-300 cursor-pointer relative group flex flex-col h-full min-h-[220px]">
<div class="flex justify-between items-start mb-6">
<span class="font-label text-[10px] uppercase tracking-widest text-secondary bg-surface-dim/50 px-3 py-1 rounded-full">Collection</span>
</div>
<div class="mt-auto">
<h3 class="font-headline text-2xl text-on-surface font-medium leading-snug mb-3 group-hover:text-primary transition-colors">Letters from the Coast</h3>
<div class="flex items-center gap-2 font-label text-xs text-secondary">
<span class="material-symbols-outlined text-[14px]" data-icon="history">history</span>
<span>Edited yesterday</span>
</div>
</div>
</article>
<!-- Card 3 -->
<article class="bg-surface-container-low rounded-xl p-8 hover:-translate-y-1 transition-transform duration-300 cursor-pointer relative group flex flex-col h-full min-h-[220px]">
<div class="flex justify-between items-start mb-6">
<span class="font-label text-[10px] uppercase tracking-widest text-secondary bg-surface-dim/50 px-3 py-1 rounded-full">Fragment</span>
</div>
<div class="mt-auto">
<h3 class="font-headline text-2xl text-on-surface font-medium leading-snug mb-3 group-hover:text-primary transition-colors italic text-on-surface-variant">Untitled Fragment #04</h3>
<div class="flex items-center gap-2 font-label text-xs text-secondary">
<span class="material-symbols-outlined text-[14px]" data-icon="history">history</span>
<span>Edited Oct 12</span>
</div>
</div>
</article>
<!-- Create New Action Card -->
<article class="bg-surface border border-outline-variant/15 border-dashed rounded-xl p-8 hover:bg-surface-container-low transition-colors duration-300 cursor-pointer flex flex-col items-center justify-center text-center h-full min-h-[220px]">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary flex items-center justify-center mb-4">
<span class="material-symbols-outlined" data-icon="add">add</span>
</div>
<h3 class="font-headline text-xl text-on-surface font-medium mb-2">New Project</h3>
<p class="font-label text-xs text-secondary">Start a blank page</p>
</article>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-[#fbf9f4]/70 dark:bg-slate-900/70 backdrop-blur-xl text-slate-800 dark:text-slate-100 font-sans text-[10px] uppercase tracking-widest fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-full shadow-[0_8px_24px_rgba(27,28,25,0.06)] tap-highlight-transparent active:scale-90 transition-transform flex justify-around items-center px-4 max-w-md mx-auto z-50 py-2">
<!-- Active Tab: Dashboard/Library -->
<button class="bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-900 rounded-full p-3 hover:opacity-80 flex flex-col items-center justify-center">
<span class="material-symbols-outlined" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</button>
<!-- Inactive Tabs -->
<button class="text-slate-400 dark:text-slate-500 p-3 hover:opacity-80 flex flex-col items-center justify-center">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</button>
<button class="text-slate-400 dark:text-slate-500 p-3 hover:opacity-80 flex flex-col items-center justify-center">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<button class="text-slate-400 dark:text-slate-500 p-3 hover:opacity-80 flex flex-col items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
</body></html>
